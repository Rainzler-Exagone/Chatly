services:
  # --- Database ---
  db:
    image: postgres:17
    container_name: chatly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1213
      POSTGRES_DB: chatly
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Object Storage (S3 Compatible) ---
  minio:
    image: minio/minio:latest
    container_name: dev-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  # --- Your Backend ---
  backend:
    env_file:
      - .env
    build: .
    container_name: chatly-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 1213
      DB_NAME: chatly
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - .:/app
      - /app/node_modules # Prevents local modules from overwriting container ones

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

    command: npm run start:dev

volumes:
  pgdata:
  miniodata:
